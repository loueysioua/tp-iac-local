<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TP IaC — Terraform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #5c4ee5;
    }
    p {
      color: #555;
    }
    .badge {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      margin-top: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Application Deployed via Terraform IaC!</h1>
    <p>Infrastructure as Code — TP DevOps</p>
    <span class="badge">&#x2705; Conteneur opérationnel</span>
  </div>
</body>
</html>
